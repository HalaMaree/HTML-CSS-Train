<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Cairo:wght@200..1000&family=Concert+One&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 97vh;
        background-color: #e3dbbb;
        font-family: "Bruno Ace SC", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      .login-card {
        display: flex;
        flex-direction: column;
        width: 400px;
        padding: 50px;
        gap: 10px;
        background-color: #f8f3e1;
        border-radius: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      input {
        width: 95%;
        padding: 10px;
        margin: 8px 0px;
        border: 2px solid #ddd;
        border-radius: 10px;
      }
      input:focus {
        border-color: black;
      }
      button {
        width: 30%;
        padding: 10px;
        margin-top: 20px;
        background-color: #aeb784;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-family: "Bruno Ace SC", sans-serif;
        font-size: 16px;
        align-self: flex-end;
      }
      button:hover {
        background-color: #41431b;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <form class="login-card" action="userInfo.html">
        <h2>Login</h2>

        <label>Email</label>
        <input type="email" required />

        <label>Password</label>
        <input type="password" minlength="8" required />

        <button type="submit">Login</button>
      </form>
    </main>
  </body>
</html>
